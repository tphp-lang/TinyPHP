name: Test

on:
  workflow_dispatch:

jobs:
  # ============================================================
  # Windows x86_64 — TCC / GCC / Clang
  # ============================================================
  windows-x86_64:
    runs-on: windows-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-cli-win.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        if: matrix.compiler != 'tcc'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-make
            git

      - name: Build TCC
        shell: pwsh
        run: .\build.cmd

      - name: Download PHP
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:PHP_URL -OutFile php.zip
          Expand-Archive -Path php.zip -DestinationPath .
          if (!(Test-Path php.exe)) { throw "php.exe not found" }

      - name: Test
        shell: pwsh
        run: |
          $cc = "${{ matrix.compiler }}"
          $ccFlag = if ($cc -eq 'tcc') { '' } else { '-cc ' + $cc }
          $proc = Start-Process php.exe -ArgumentList '.github/scripts/run_tests.php',$ccFlag -NoNewWindow -PassThru -Wait
          exit $proc.ExitCode

  # ============================================================
  # Linux x86_64 — TCC / GCC / Clang
  # ============================================================
  linux-x86_64:
    runs-on: ubuntu-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-x86_64-glibc.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev git
          if [ "${{ matrix.compiler }}" = "clang" ]; then sudo apt install -y clang; fi

      - name: Build TCC
        run: bash build.sh

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Test
        run: |
          ccFlag=""
          if [ "${{ matrix.compiler }}" != "tcc" ]; then ccFlag="-cc ${{ matrix.compiler }}"; fi
          ./php .github/scripts/run_tests.php $ccFlag

  # ============================================================
  # Linux aarch64 — TCC / GCC / Clang
  # ============================================================
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-aarch64-glibc.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev git
          if [ "${{ matrix.compiler }}" = "clang" ]; then sudo apt install -y clang; fi

      - name: Build TCC
        run: bash build.sh

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Test
        run: |
          ccFlag=""
          if [ "${{ matrix.compiler }}" != "tcc" ]; then ccFlag="-cc ${{ matrix.compiler }}"; fi
          ./php .github/scripts/run_tests.php $ccFlag

  # ============================================================
  # macOS aarch64 — TCC / GCC / Clang
  # ============================================================
  macos-aarch64:
    runs-on: macos-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-macos-aarch64.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Build TCC
        run: |
          set -e
          export LANG=C
          SDK=$(xcrun --show-sdk-path)
          for i in 1 2 3; do
            echo "[*] Clone attempt $i..."
            git clone --depth 1 --branch mob https://repo.or.cz/tinycc.git tinycc-src 2>/dev/null && break
            if [ "$i" -lt 3 ]; then sleep 10; fi
          done
          test -d tinycc-src || { echo "TCC clone failed"; exit 1; }
          cd tinycc-src
          for i in include/*.h; do test -f $i && ln -sf $i $(basename $i); done
          ./configure \
            --prefix=../tcc \
            --bindir=../tcc \
            --crtprefix="../tcc:/usr/lib" \
            --libpaths="../tcc:/usr/local/lib:/usr/lib:/lib" \
            --sysincludepaths="../tcc/include:/usr/local/include:$SDK/usr/include" \
            --extra-cflags="-I$SDK/usr/include -O3" \
            --cc=cc \
            --config-new_macho=yes \
            --config-codesign=yes \
            --config-bcheck=yes \
            --config-backtrace=yes \
            --enable-static
          make
          make install
          cd ..
          find tcc -name libtcc1.a -exec cp {} tcc/libtcc1.a \; -quit
          test -f tcc/libtcc1.a || { echo "ERROR: libtcc1.a not found"; exit 1; }
          ln -sf /usr/lib/libSystem.B.dylib tcc/libc.dylib 2>/dev/null || true
          # Copy macOS SDK headers into tcc/include/ for standalone compilation
          mkdir -p tcc/include
          cp -rn "$SDK/usr/include/"* tcc/include/ 2>/dev/null || true
          echo "  SDK headers: $(find tcc/include -type f 2>/dev/null | wc -l) files"
          echo 'int main(){return 0;}' > _test_tcc.c
          ./tcc/tcc -o _test_tcc _test_tcc.c
          rm -f _test_tcc.c _test_tcc
          rm -f tcc/libc.dylib

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Test
        run: |
          ccFlag=""
          if [ "${{ matrix.compiler }}" != "tcc" ]; then ccFlag="-cc ${{ matrix.compiler }}"; fi
          ./php .github/scripts/run_tests.php $ccFlag
