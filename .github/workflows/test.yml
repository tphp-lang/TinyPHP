name: Test

on:
  workflow_dispatch:

jobs:
  # ============================================================
  # Windows x86_64 — TCC / GCC / Clang + MySQL (Chocolatey)
  #   GitHub Actions Windows runner 不支持 services, 改用 choco 安装
  # ============================================================
  windows-x86_64:
    runs-on: windows-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-cli-win.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-win-x86_64.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        if: matrix.compiler != 'tcc'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-make

      - name: Install MySQL
        shell: pwsh
        run: |
          # choco 安装 MySQL 在 runner 上经常超时, 改用官方 ZIP 包手动安装
          # dev.mysql.com 不稳定, 使用镜像源下载
          $mysqlVer = "8.0.42"
          $mysqlZip = "mysql-$mysqlVer-winx64.zip"
          $mirrors = @(
            "https://mirrors.tuna.tsinghua.edu.cn/mysql/downloads/MySQL-8.0/$mysqlZip",
            "https://repo.huaweicloud.com/mysql/Downloads/MySQL-8.0/$mysqlZip",
            "https://mirrors.aliyun.com/mysql/MySQL-8.0/$mysqlZip",
            "https://dev.mysql.com/get/Downloads/MySQL-8.0/$mysqlZip"
          )
          $downloaded = $false
          foreach ($url in $mirrors) {
            Write-Host "Trying: $url"
            try {
              Invoke-WebRequest -Uri $url -OutFile $mysqlZip -TimeoutSec 120
              $downloaded = $true
              Write-Host "Downloaded from: $url"
              break
            } catch {
              Write-Host "Failed: $($_.Exception.Message)"
            }
          }
          if (-not $downloaded) { throw "All mirrors failed to download MySQL" }
          Expand-Archive -Path $mysqlZip -DestinationPath C:\mysql -Force
          # 重命名目录 (避免版本号变化导致路径变动)
          $srcDir = Get-ChildItem -Path C:\mysql -Directory | Select-Object -First 1
          if ($srcDir.Name -ne "current") {
            Rename-Item $srcDir.FullName "current"
          }
          $mysqlBin = "C:\mysql\current\bin"
          $env:PATH += ";$mysqlBin"
          # 生成 my.ini (启用 mysql_native_password 插件)
          $myini = @"
          [mysqld]
          mysql_native_password=ON
          port=3306
          basedir=C:/mysql/current
          datadir=C:/mysql/current/data
          "@
          Set-Content -Path "C:\mysql\current\my.ini" -Value $myini
          # 初始化数据目录 (不生成随机密码)
          & "$mysqlBin\mysqld.exe" --defaults-file="C:\mysql\current\my.ini" --initialize-insecure --console
          # 安装为 Windows 服务并启动
          & "$mysqlBin\mysqld.exe" --install MySQL --defaults-file="C:\mysql\current\my.ini"
          Start-Service MySQL
          # 等待 MySQL 就绪
          for ($i = 1; $i -le 30; $i++) {
            try {
              $result = & mysql -uroot -e "SELECT 1" 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "MySQL is ready (empty password)"
                break
              }
            } catch {}
            Write-Host "Waiting for MySQL... ($i/30)"
            Start-Sleep -Seconds 2
          }
          # 设置 root 密码为 mysql_native_password 认证 (纯 C 客户端不支持 caching_sha2_password)
          mysql -uroot -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'root'; FLUSH PRIVILEGES;"
          mysql -uroot -proot -e "SELECT VERSION();"

      - name: Add TCC
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:TCC_URL -OutFile tcc.zip
          Expand-Archive -Path tcc.zip -DestinationPath .
          .\tcc\win32\tcc.exe -v

      - name: Download PHP
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:PHP_URL -OutFile php.zip
          Expand-Archive -Path php.zip -DestinationPath .
          if (!(Test-Path php.exe)) { throw "php.exe not found" }

      - name: Test
        shell: pwsh
        run: |
          $cc = "${{ matrix.compiler }}"
          $ccFlag = if ($cc -eq 'tcc') { '' } else { '-cc ' + $cc }
          $proc = Start-Process php.exe -ArgumentList '.github/scripts/run_tests.php',$ccFlag -NoNewWindow -PassThru -Wait
          exit $proc.ExitCode

  # ============================================================
  # Linux x86_64 — TCC / GCC / Clang + MySQL 8 (services container)
  # ============================================================
  linux-x86_64:
    runs-on: ubuntu-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-x86_64-glibc.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-linux-x86_64.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev default-mysql-client
          if [ "${{ matrix.compiler }}" = "clang" ]; then sudo apt install -y clang; fi

      - name: Add TCC
        run: |
          curl -fsSL -o tcc.zip "$TCC_URL"
          unzip -q tcc.zip
          chmod +x tcc/tcc
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Verify MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "SELECT VERSION();"
          # 修改 root@% 认证插件为 mysql_native_password（纯 C 客户端不支持 caching_sha2_password）
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'root'; FLUSH PRIVILEGES;"

      - name: Test
        run: |
          ccFlag=""
          if [ "${{ matrix.compiler }}" != "tcc" ]; then ccFlag="-cc ${{ matrix.compiler }}"; fi
          ./php .github/scripts/run_tests.php $ccFlag

  # ============================================================
  # Linux aarch64 — TCC / GCC / Clang + MySQL 8 (services container)
  # ============================================================
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-aarch64-glibc.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-linux-aarch64.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev default-mysql-client
          if [ "${{ matrix.compiler }}" = "clang" ]; then sudo apt install -y clang; fi

      - name: Add TCC
        run: |
          curl -fsSL -o tcc.zip "$TCC_URL"
          unzip -q tcc.zip
          chmod +x tcc/tcc
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Verify MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "SELECT VERSION();"
          # 修改 root@% 认证插件为 mysql_native_password（纯 C 客户端不支持 caching_sha2_password）
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'root'; FLUSH PRIVILEGES;"

      - name: Test
        run: |
          ccFlag=""
          if [ "${{ matrix.compiler }}" != "tcc" ]; then ccFlag="-cc ${{ matrix.compiler }}"; fi
          ./php .github/scripts/run_tests.php $ccFlag

  # ============================================================
  # macOS aarch64 — TCC / GCC / Clang + MySQL (Homebrew)
  # ============================================================
  macos-aarch64:
    runs-on: macos-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-macos-aarch64.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-macos-aarch64.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install deps & MySQL
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then brew install gcc; fi
          brew install mysql
          # 启用 mysql_native_password 插件 (MySQL 9.x 默认禁用, 纯 C 客户端需要)
          MYCNF="$(brew --prefix)/etc/my.cnf"
          if [ -f "$MYCNF" ] && grep -q "^\[mysqld\]" "$MYCNF"; then
            echo "mysql_native_password=ON" >> "$MYCNF"
          else
            printf "[mysqld]\nmysql_native_password=ON\n" >> "$MYCNF"
          fi
          brew services start mysql
          # 等待 MySQL 就绪
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot --silent 2>/dev/null; then
              echo "MySQL is ready (empty password)"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          # 设置 root 密码为 mysql_native_password 认证 (纯 C 客户端不支持 caching_sha2_password)
          mysql -uroot -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'root'; FLUSH PRIVILEGES;"
          mysql -uroot -proot -e "SELECT VERSION();"

      - name: Add TCC
        run: |
          curl -fsSL -o tcc.zip "$TCC_URL"
          unzip -q tcc.zip
          chmod +x tcc/tcc
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Test
        run: |
          ccFlag=""
          if [ "${{ matrix.compiler }}" != "tcc" ]; then ccFlag="-cc ${{ matrix.compiler }}"; fi
          ./php .github/scripts/run_tests.php $ccFlag
