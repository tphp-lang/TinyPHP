name: Test

on:
  workflow_dispatch:

jobs:
  # ============================================================
  # Windows x86_64 — TCC / GCC / Clang + MySQL (Chocolatey)
  #   GitHub Actions Windows runner 不支持 services, 改用 choco 安装
  # ============================================================
  windows-x86_64:
    runs-on: windows-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-cli-win.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-win-x86_64.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        if: matrix.compiler != 'tcc'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-make

      - name: Install MySQL
        shell: pwsh
        run: |
          choco install mysql -y --no-progress
          $env:PATH += ";C:\tools\mysql\current\bin;C:\ProgramData\MySQL\MySQL Server*\bin"
          # MySQL 9.x (choco 默认) 默认不加载 mysql_native_password 插件,
          # 需在 my.ini 中启用后重启服务
          $myini = Get-ChildItem -Path "C:\tools\mysql" -Filter "my.ini" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($myini) {
            $lines = Get-Content $myini.FullName
            if (-not ($lines -match 'mysql_native_password')) {
              $newLines = @()
              $found = $false
              foreach ($line in $lines) {
                $newLines += $line
                if ($line -match '^\[mysqld\]') {
                  $newLines += "mysql_native_password=ON"
                  $found = $true
                }
              }
              if (-not $found) {
                $newLines += "[mysqld]"
                $newLines += "mysql_native_password=ON"
              }
              Set-Content $myini.FullName $newLines
              Write-Host "Added mysql_native_password=ON to $($myini.FullName)"
            }
          }
          # 重启 MySQL 服务使配置生效
          $svc = Get-Service -Name "*mysql*" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($svc) {
            Write-Host "Restarting service: $($svc.Name)"
            Restart-Service $svc.Name -Force
          }
          # 等待 MySQL 就绪
          for ($i = 1; $i -le 30; $i++) {
            try {
              $result = & mysql -uroot -e "SELECT 1" 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "MySQL is ready (empty password)"
                break
              }
            } catch {}
            Write-Host "Waiting for MySQL... ($i/30)"
            Start-Sleep -Seconds 2
          }
          # 设置 root 密码为 mysql_native_password 认证 (纯 C 客户端不支持 caching_sha2_password)
          mysql -uroot -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'root'; FLUSH PRIVILEGES;"
          mysql -uroot -proot -e "SELECT VERSION();"

      - name: Add TCC
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:TCC_URL -OutFile tcc.zip
          Expand-Archive -Path tcc.zip -DestinationPath .
          .\tcc\win32\tcc.exe -v

      - name: Download PHP
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:PHP_URL -OutFile php.zip
          Expand-Archive -Path php.zip -DestinationPath .
          if (!(Test-Path php.exe)) { throw "php.exe not found" }

      - name: Test
        shell: pwsh
        run: |
          $cc = "${{ matrix.compiler }}"
          $ccFlag = if ($cc -eq 'tcc') { '' } else { '-cc ' + $cc }
          $proc = Start-Process php.exe -ArgumentList '.github/scripts/run_tests.php',$ccFlag -NoNewWindow -PassThru -Wait
          exit $proc.ExitCode

  # ============================================================
  # Linux x86_64 — TCC / GCC / Clang + MySQL 8 (services container)
  # ============================================================
  linux-x86_64:
    runs-on: ubuntu-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-x86_64-glibc.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-linux-x86_64.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev default-mysql-client
          if [ "${{ matrix.compiler }}" = "clang" ]; then sudo apt install -y clang; fi

      - name: Add TCC
        run: |
          curl -fsSL -o tcc.zip "$TCC_URL"
          unzip -q tcc.zip
          chmod +x tcc/tcc
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Verify MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "SELECT VERSION();"
          # 修改 root@% 认证插件为 mysql_native_password（纯 C 客户端不支持 caching_sha2_password）
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'root'; FLUSH PRIVILEGES;"

      - name: Test
        run: |
          ccFlag=""
          if [ "${{ matrix.compiler }}" != "tcc" ]; then ccFlag="-cc ${{ matrix.compiler }}"; fi
          ./php .github/scripts/run_tests.php $ccFlag

  # ============================================================
  # Linux aarch64 — TCC / GCC / Clang + MySQL 8 (services container)
  # ============================================================
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-aarch64-glibc.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-linux-aarch64.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev default-mysql-client
          if [ "${{ matrix.compiler }}" = "clang" ]; then sudo apt install -y clang; fi

      - name: Add TCC
        run: |
          curl -fsSL -o tcc.zip "$TCC_URL"
          unzip -q tcc.zip
          chmod +x tcc/tcc
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Verify MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "SELECT VERSION();"
          # 修改 root@% 认证插件为 mysql_native_password（纯 C 客户端不支持 caching_sha2_password）
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'root'; FLUSH PRIVILEGES;"

      - name: Test
        run: |
          ccFlag=""
          if [ "${{ matrix.compiler }}" != "tcc" ]; then ccFlag="-cc ${{ matrix.compiler }}"; fi
          ./php .github/scripts/run_tests.php $ccFlag

  # ============================================================
  # macOS aarch64 — TCC / GCC / Clang + MySQL (Homebrew)
  # ============================================================
  macos-aarch64:
    runs-on: macos-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-macos-aarch64.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-macos-aarch64.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install deps & MySQL
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then brew install gcc; fi
          brew install mysql
          brew services start mysql
          # 等待 MySQL 就绪
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -uroot --silent 2>/dev/null; then
              echo "MySQL is ready (empty password)"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          # 设置 root 密码为 root (统一与 Linux/Windows 一致)
          mysql -uroot -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'root'; FLUSH PRIVILEGES;"
          mysql -uroot -proot -e "SELECT VERSION();"

      - name: Add TCC
        run: |
          curl -fsSL -o tcc.zip "$TCC_URL"
          unzip -q tcc.zip
          chmod +x tcc/tcc
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Test
        run: |
          ccFlag=""
          if [ "${{ matrix.compiler }}" != "tcc" ]; then ccFlag="-cc ${{ matrix.compiler }}"; fi
          ./php .github/scripts/run_tests.php $ccFlag
