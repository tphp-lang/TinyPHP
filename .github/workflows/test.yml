name: Test

on:
  workflow_dispatch:

jobs:
  # ============================================================
  # Windows x86_64 — TCC / GCC / Clang + MySQL (Chocolatey)
  #   GitHub Actions Windows runner 不支持 services, 改用 choco 安装
  # ============================================================
  windows-x86_64:
    runs-on: windows-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-cli-win.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-win-x86_64.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        if: matrix.compiler != 'tcc'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-make

      - name: Install MariaDB
        shell: pwsh
        run: |
          # MySQL 镜像站已停止同步 MySQL 8.0, 改用 MariaDB
          # MariaDB 默认使用 mysql_native_password, 无需插件配置
          # MariaDB 兼容 MySQL 协议, 纯 C 客户端可直接连接
          $mariaVer = "10.11.11"
          $mariaZip = "mariadb-$mariaVer-winx64.zip"
          $mirrors = @(
            "https://archive.mariadb.org/mariadb-$mariaVer/winx64-packages/$mariaZip",
            "https://mirror.mariadb.org/mariadb/mariadb-$mariaVer/winx64-packages/$mariaZip"
          )
          $downloaded = $false
          foreach ($url in $mirrors) {
            Write-Host "Trying: $url"
            try {
              Invoke-WebRequest -Uri $url -OutFile $mariaZip -TimeoutSec 180
              $downloaded = $true
              Write-Host "Downloaded from: $url"
              break
            } catch {
              Write-Host "Failed: $($_.Exception.Message)"
            }
          }
          if (-not $downloaded) { throw "All mirrors failed to download MariaDB" }
          Expand-Archive -Path $mariaZip -DestinationPath C:\mariadb -Force
          $srcDir = Get-ChildItem -Path C:\mariadb -Directory | Select-Object -First 1
          if ($srcDir.Name -ne "current") {
            Rename-Item $srcDir.FullName "current"
          }
          $mariaBin = "C:\mariadb\current\bin"
          $env:PATH += ";$mariaBin"
          # mariadb-install-db.exe 一步完成: 初始化数据目录 + 注册 Windows 服务 + 设置 root 密码
          #   --service=MySQL  → 注册名为 "MySQL" 的 Windows 服务
          #   --password=root  → root 密码设为 "root"
          & "$mariaBin\mariadb-install-db.exe" --datadir="C:/mariadb/current/data" --service=MySQL --password=root 2>&1
          # 启动服务
          Start-Service MySQL
          # 等待就绪
          for ($i = 1; $i -le 30; $i++) {
            try {
              $result = & mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "SELECT 1" 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "MariaDB is ready"
                break
              }
            } catch {}
            Write-Host "Waiting for MariaDB... ($i/30)"
            Start-Sleep -Seconds 2
          }
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "SELECT VERSION();"

      - name: Add TCC
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:TCC_URL -OutFile tcc.zip
          Expand-Archive -Path tcc.zip -DestinationPath .
          .\tcc\win32\tcc.exe -v

      - name: Download PHP
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:PHP_URL -OutFile php.zip
          Expand-Archive -Path php.zip -DestinationPath .
          if (!(Test-Path php.exe)) { throw "php.exe not found" }

      - name: Test
        shell: pwsh
        run: |
          $cc = "${{ matrix.compiler }}"
          $ccFlag = if ($cc -eq 'tcc') { '' } else { '-cc ' + $cc }
          $proc = Start-Process php.exe -ArgumentList '.github/scripts/run_tests.php',$ccFlag -NoNewWindow -PassThru -Wait
          exit $proc.ExitCode

  # ============================================================
  # Linux x86_64 — TCC / GCC / Clang + MySQL 8 (services container)
  # ============================================================
  linux-x86_64:
    runs-on: ubuntu-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-x86_64-glibc.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-linux-x86_64.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev default-mysql-client
          if [ "${{ matrix.compiler }}" = "clang" ]; then sudo apt install -y clang; fi

      - name: Add TCC
        run: |
          curl -fsSL -o tcc.zip "$TCC_URL"
          unzip -q tcc.zip
          chmod +x tcc/tcc
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Verify MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "SELECT VERSION();"
          # 修改 root@% 认证插件为 mysql_native_password（纯 C 客户端不支持 caching_sha2_password）
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'root'; FLUSH PRIVILEGES;"

      - name: Test
        run: |
          ccFlag=""
          if [ "${{ matrix.compiler }}" != "tcc" ]; then ccFlag="-cc ${{ matrix.compiler }}"; fi
          ./php .github/scripts/run_tests.php $ccFlag

  # ============================================================
  # Linux aarch64 — TCC / GCC / Clang + MySQL 8 (services container)
  # ============================================================
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-aarch64-glibc.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-linux-aarch64.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev default-mysql-client
          if [ "${{ matrix.compiler }}" = "clang" ]; then sudo apt install -y clang; fi

      - name: Add TCC
        run: |
          curl -fsSL -o tcc.zip "$TCC_URL"
          unzip -q tcc.zip
          chmod +x tcc/tcc
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Verify MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -proot --silent 2>/dev/null; then
              echo "MySQL is ready"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "SELECT VERSION();"
          # 修改 root@% 认证插件为 mysql_native_password（纯 C 客户端不支持 caching_sha2_password）
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "ALTER USER 'root'@'%' IDENTIFIED WITH mysql_native_password BY 'root'; FLUSH PRIVILEGES;"

      - name: Test
        run: |
          ccFlag=""
          if [ "${{ matrix.compiler }}" != "tcc" ]; then ccFlag="-cc ${{ matrix.compiler }}"; fi
          ./php .github/scripts/run_tests.php $ccFlag

  # ============================================================
  # macOS aarch64 — TCC / GCC / Clang + MySQL (Homebrew)
  # ============================================================
  macos-aarch64:
    runs-on: macos-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-macos-aarch64.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-macos-aarch64.zip
    strategy:
      matrix:
        compiler: [tcc, gcc, clang]
    steps:
      - uses: actions/checkout@v4

      - name: Install deps & MariaDB
        run: |
          if [ "${{ matrix.compiler }}" = "gcc" ]; then brew install gcc; fi
          # 使用 MariaDB 替代 MySQL (默认 mysql_native_password, 无插件配置问题)
          brew install mariadb
          # 直接后台启动 mysqld (brew services 在 CI 环境不可靠)
          "$(brew --prefix)/bin/mysqld" --datadir="$(brew --prefix)/var/mysql" --port=3306 &
          # 等待就绪 (用 socket 连接, MariaDB root 默认 unix_socket 认证)
          for i in {1..30}; do
            if mysqladmin ping -uroot --silent 2>/dev/null; then
              echo "MariaDB is ready"
              break
            fi
            echo "Waiting for MariaDB... ($i/30)"
            sleep 2
          done
          # MariaDB root 默认使用 unix_socket 认证 (只允许本地 socket 连接)
          # 改为 mysql_native_password + 密码, 使纯 C 客户端可通过 TCP 连接
          mysql -uroot -e "ALTER USER 'root'@'localhost' IDENTIFIED VIA mysql_native_password USING PASSWORD('root'); FLUSH PRIVILEGES;"
          mysql -h 127.0.0.1 -P 3306 -uroot -proot -e "SELECT VERSION();"

      - name: Add TCC
        run: |
          curl -fsSL -o tcc.zip "$TCC_URL"
          unzip -q tcc.zip
          chmod +x tcc/tcc
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Test
        run: |
          ccFlag=""
          if [ "${{ matrix.compiler }}" != "tcc" ]; then ccFlag="-cc ${{ matrix.compiler }}"; fi
          ./php .github/scripts/run_tests.php $ccFlag
