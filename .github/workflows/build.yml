name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================
  # Windows x86_64 — MSYS2 MinGW64 编译 TCC (mob 分支)
  # ============================================================
  windows-x86_64:
    runs-on: windows-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-cli-win.zip
      MICRO_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-micro-win.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-win-x86_64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make

      - name: Add TCC
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:TCC_URL -OutFile tcc.zip
          Expand-Archive -Path tcc.zip -DestinationPath .
          .\tcc\win32\tcc.exe -v

      - name: Download PHP
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:PHP_URL -OutFile php.zip
          Expand-Archive -Path php.zip -DestinationPath .

      - name: Download MICRO
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:MICRO_URL -OutFile micro.zip
          Expand-Archive -Path micro.zip -DestinationPath .

      - name: BUILD PHAR
        shell: pwsh
        run: |
          php.exe -d "phar.readonly=0" build.php
          $micro = [System.IO.File]::ReadAllBytes('micro.sfx')
          $phar  = [System.IO.File]::ReadAllBytes('tphp.phar')
          [System.IO.File]::WriteAllBytes('tphp.exe', $micro + $phar)

      - name: Test
        shell: pwsh
        run: |
          ./tphp.exe test/main/min.php
          ./min.exe

      - name: Package
        shell: pwsh
        run: |
          mkdir release/tphp
          Copy-Item tphp.exe release/tphp/

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-win-x86_64
          path: release

  # ============================================================
  # Linux x86_64 — GCC 编译 TCC (mob 分支)
  # ============================================================
  linux-x86_64:
    runs-on: ubuntu-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-x86_64-glibc.zip
      MICRO_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-micro-8.4-linux-x86_64-glibc.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-linux-x86_64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake gcc make

      - name: Add TCC
        run: |
          curl -fsSL -o tcc.zip "$TCC_URL"
          unzip -q tcc.zip
          chmod +x tcc/tcc
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Download MICRO
        run: |
          curl -fsSL -o micro.zip "$MICRO_URL"
          unzip -q micro.zip
          chmod +x micro.sfx

      - name: BUILD PHAR
        run: |
          ./php -d "phar.readonly=0" build.php
          cat micro.sfx tphp.phar > tphp
          chmod +x tphp

      - name: Test
        run: |
          ./tphp test/main/min.php
          ./min

      - name: Package
        run: |
          mkdir -p release/tphp
          cp tphp release/tphp/
          chmod +x release/tphp/tphp

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-linux-x86_64
          path: release

  # ============================================================
  # Linux aarch64 — GCC 编译 TCC (mob 分支)
  # ============================================================
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-aarch64-glibc.zip
      MICRO_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-micro-8.4-linux-aarch64-glibc.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-linux-aarch64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake gcc make

      - name: Add TCC
        run: |
          curl -fsSL -o tcc.zip "$TCC_URL"
          unzip -q tcc.zip
          chmod +x tcc/tcc
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Download MICRO
        run: |
          curl -fsSL -o micro.zip "$MICRO_URL"
          unzip -q micro.zip
          chmod +x micro.sfx

      - name: BUILD PHAR
        run: |
          ./php -d "phar.readonly=0" build.php
          cat micro.sfx tphp.phar > tphp
          chmod +x tphp

      - name: Test
        run: |
          ./tphp test/main/min.php
          ./min

      - name: Package
        run: |
          mkdir -p release/tphp
          cp tphp release/tphp/
          chmod +x release/tphp/tphp

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-linux-aarch64
          path: release

  # ============================================================
  # macOS aarch64 — clang 编译 TCC (mob 分支)
  # ============================================================
  macos-aarch64:
    runs-on: macos-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-macos-aarch64.zip
      MICRO_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-micro-8.4-macos-aarch64.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-macos-aarch64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Add TCC
        run: |
          curl -fsSL -o tcc.zip "$TCC_URL"
          unzip -q tcc.zip
          chmod +x tcc/tcc
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Download MICRO
        run: |
          curl -fsSL -o micro.zip "$MICRO_URL"
          unzip -q micro.zip
          chmod +x micro.sfx

      - name: BUILD PHAR
        run: |
          ./php -d "phar.readonly=0" build.php
          cat micro.sfx tphp.phar > tphp
          chmod +x tphp

      - name: Test
        run: |
          ./tphp test/main/min.php
          ./min

      - name: Package
        run: |
          mkdir -p release/tphp
          cp tphp release/tphp/
          chmod +x release/tphp/tphp

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-macos-aarch64
          path: release
