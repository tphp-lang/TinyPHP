          mkdir -p "$DIR/build"
          cmake -DCMAKE_C_COMPILER=cc -DCMAKE_BUILD_TYPE=Release \
            -S "$DIR" -B "$DIR/build"
          cmake --build "$DIR/build" -j$(sysctl -n hw.ncpu)
          mkdir -p ext/libevent/include ext/libevent/lib
          cp -r "$DIR/include/"* ext/libevent/include/
          cp "$DIR/build/lib/libevent.a" ext/libevent/lib/libevent_core.a
