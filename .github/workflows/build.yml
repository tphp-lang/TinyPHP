name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================
  # Windows x86_64 — MSYS2 MinGW64 编译 TCC (mob 分支)
  # ============================================================
  windows-x86_64:
    runs-on: windows-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-cli-win.zip
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            git

      - name: Build TCC
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          bash build.cmd
          ls -la tcc/win32/tcc.exe

      - name: Download PHP
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:PHP_URL -OutFile php.zip
          Expand-Archive -Path php.zip -DestinationPath .
          ls php.exe

      - name: Test
        shell: pwsh
        run: ./php tphp.php test/main/min.php

      - name: Package
        shell: pwsh
        run: |
          mkdir release
          Copy-Item tcc/win32 -Recurse -Destination release/tphp/tcc/win32
          Copy-Item php.exe release/tphp/
          Copy-Item tphp.php release/tphp/
          Copy-Item src -Recurse -Destination release/tphp/src
          Copy-Item include -Recurse -Destination release/tphp/include
          Copy-Item tphp.cmd release/tphp/

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-win-x86_64
          path: release

  # ============================================================
  # Linux x86_64 — GCC 编译 TCC (mob 分支)
  # ============================================================
  linux-x86_64:
    runs-on: ubuntu-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-x86_64-glibc.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC & deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev git

      - name: Build TCC
        run: |
          bash build.sh
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php
          ./php -v

      - name: UPX compress PHP
        run: |
          sudo apt install -y upx-ucl
          upx --best php

      - name: Test
        run: ./php tphp.php test/main/min.php

      - name: Package
        run: |
          mkdir -p release
          cp -r tcc release/tphp/
          cp php release/tphp/
          cp tphp.php release/tphp/
          cp -r src release/tphp/
          cp -r include release/tphp/
          cp tphp.sh release/tphp/

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-linux-x86_64
          path: release

  # ============================================================
  # Linux aarch64 — GCC 编译 TCC (mob 分支)
  # ============================================================
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-aarch64-glibc.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC & deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev git

      - name: Build TCC
        run: |
          bash build.sh
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php
          ./php -v

      - name: UPX compress PHP
        run: |
          sudo apt install -y upx-ucl
          upx --best php

      - name: Test
        run: ./php tphp.php test/main/min.php

      - name: Package
        run: |
          mkdir -p release
          cp -r tcc release/tphp/
          cp php release/tphp/
          cp tphp.php release/tphp/
          cp -r src release/tphp/
          cp -r include release/tphp/
          cp tphp.sh release/tphp/

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-linux-aarch64
          path: release

  # ============================================================
  # macOS aarch64 — clang 编译 TCC (mob 分支)
  # ============================================================
  macos-aarch64:
    runs-on: macos-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-macos-aarch64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Build TCC
        run: |
          SDK=$(xcrun --show-sdk-path)
          git clone --depth 1 --branch mob https://repo.or.cz/tinycc.git tinycc-src
          cd tinycc-src
          ./configure \
            --prefix=../tcc \
            --bindir=../tcc \
            --crtprefix="../tcc/lib:$SDK/usr/lib" \
            --libpaths="../tcc/lib:$SDK/usr/lib:/usr/lib:/usr/local/lib" \
            --extra-cflags="-I$SDK/usr/include -O3" \
            --cc=cc \
            --config-bcheck=yes \
            --config-backtrace=yes
          make
          make install
          cd ..
          cp tcc/tcc tcc/tcc 2>/dev/null || true
          ls -la tcc/tcc

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php
          ./php -v

      - name: UPX compress PHP
        run: |
          brew install upx
          upx --best php

      - name: Test
        run: ./php tphp.php test/main/min.php

      - name: Package
        run: |
          mkdir -p release
          cp -r tcc release/tphp/
          cp php release/tphp/
          cp tphp.php release/tphp/
          cp -r src release/tphp/
          cp -r include release/tphp/
          cp tphp.sh release/tphp/

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-macos-aarch64
          path: release
