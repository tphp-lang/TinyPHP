name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================
  # Windows x86_64 — MSYS2 MinGW64 编译 TCC (mob 分支)
  # ============================================================
  windows-x86_64:
    runs-on: windows-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-cli-win.zip
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            git

      - name: Build TCC
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          mkdir -p ../tcc/win32
          git clone --depth 1 --branch mob https://repo.or.cz/tinycc.git tinycc-src
          cd tinycc-src
          ./configure --prefix=../tcc/win32 --bindir=../tcc/win32 --cc=gcc --extra-cflags=-O3
          mingw32-make
          mingw32-make install
          cp tcc.exe ../tcc/win32/
          ls -la ../tcc/win32/tcc.exe

      - name: Download PHP
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:PHP_URL -OutFile php.zip
          Expand-Archive -Path php.zip -DestinationPath .
          ls php.exe

      - name: Test
        shell: pwsh
        run: ./php tphp.php test/main/min.php

      - name: Package
        shell: pwsh
        run: |
          mkdir tphp
          Copy-Item tcc/win32 -Recurse -Destination tphp/tcc/win32
          Copy-Item php.exe tphp/
          Copy-Item tphp.php tphp/
          Copy-Item src -Recurse -Destination tphp/src
          Copy-Item include -Recurse -Destination tphp/include
          Copy-Item tphp.sh tphp/
          7z a tinyphp-win-x86_64.zip ./tphp

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-win-x86_64
          path: tinyphp-win-x86_64.zip

  # ============================================================
  # Linux x86_64 — GCC 编译 TCC (mob 分支)
  # ============================================================
  linux-x86_64:
    runs-on: ubuntu-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-x86_64-glibc.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC & deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev git

      - name: Build TCC
        run: |
          cd tcc
          bash linux.sh
          ./tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php
          ./php -v

      - name: Test
        run: ./php tphp.php test/main/min.php

      - name: Package
        run: |
          mkdir -p tphp/tcc
          cp tcc/tcc tphp/tcc/
          cp -r tcc/tcc-standalone/* tphp/tcc/ 2>/dev/null || true
          rm -rf tphp/tcc/win32 tphp/tcc/tinycc-src 2>/dev/null || true
          cp php tphp/
          cp tphp.php tphp/
          cp -r src tphp/
          cp -r include tphp/
          cp tphp.sh tphp/
          tar czf tinyphp-linux-x86_64.tar.gz tphp

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-linux-x86_64
          path: tinyphp-linux-x86_64.tar.gz

  # ============================================================
  # Linux aarch64 — GCC 编译 TCC (mob 分支)
  # ============================================================
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-aarch64-glibc.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC & deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev git

      - name: Build TCC
        run: |
          cd tcc
          bash linux.sh
          ./tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php
          ./php -v

      - name: Test
        run: ./php tphp.php test/main/min.php

      - name: Package
        run: |
          mkdir -p tphp/tcc
          cp tcc/tcc tphp/tcc/
          cp -r tcc/tcc-standalone/* tphp/tcc/ 2>/dev/null || true
          rm -rf tphp/tcc/win32 tphp/tcc/tinycc-src 2>/dev/null || true
          cp php tphp/
          cp tphp.php tphp/
          cp -r src tphp/
          cp -r include tphp/
          cp tphp.sh tphp/
          tar czf tinyphp-linux-aarch64.tar.gz tphp

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-linux-aarch64
          path: tinyphp-linux-aarch64.tar.gz

  # ============================================================
  # macOS aarch64 — clang 编译 TCC (mob 分支)
  # ============================================================
  macos-aarch64:
    runs-on: macos-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-macos-aarch64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Build TCC
        run: |
          SDK=$(xcrun --show-sdk-path)
          git clone --depth 1 --branch mob https://repo.or.cz/tinycc.git tinycc-src
          cd tinycc-src
          ./configure \
            --prefix=../tcc \
            --bindir=../tcc \
            --crtprefix="../tcc/lib:$SDK/usr/lib" \
            --libpaths="../tcc/lib:$SDK/usr/lib:/usr/lib:/usr/local/lib" \
            --extra-cflags="-I$SDK/usr/include -O3" \
            --cc=cc \
            --config-bcheck=yes \
            --config-backtrace=yes
          make
          make install
          cd ..
          cp tcc/tcc tcc/tcc 2>/dev/null || true
          ls -la tcc/tcc

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php
          ./php -v

      - name: Test
        run: ./php tphp.php test/main/min.php

      - name: Package
        run: |
          mkdir -p tphp/tcc
          cp tcc/tcc tphp/tcc/ 2>/dev/null || true
          cp -r tcc/lib tcc/include tcc/bin  tphp/tcc/ 2>/dev/null || true
          rm -rf tphp/tcc/win32 tphp/tcc/tinycc-src 2>/dev/null || true
          cp php tphp/
          cp tphp.php tphp/
          cp -r src tphp/
          cp -r include tphp/
          cp tphp.sh tphp/
          tar czf tinyphp-macos-aarch64.tar.gz tphp

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-macos-aarch64
          path: tinyphp-macos-aarch64.tar.gz
