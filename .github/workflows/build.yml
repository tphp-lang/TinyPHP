name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================
  # Windows x86_64 — MSYS2 MinGW64 编译 TCC (mob 分支)
  # ============================================================
  windows-x86_64:
    runs-on: windows-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-cli-win.zip
      MICRO_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-micro-win.zip
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-make
            git

      - name: Build TCC
        shell: pwsh
        run: .\build.cmd

      - name: Download PHP
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:PHP_URL -OutFile php.zip
          Expand-Archive -Path php.zip -DestinationPath .
          ls php.exe
      
      - name: Download MICRO
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:MICRO_URL -OutFile micro.zip
          Expand-Archive -Path micro.zip -DestinationPath .
          ls micro.sfx
      
      - name: BUILD PHAR
        shell: pwsh
        run: |
          php.exe -d "phar.readonly=0" build.php
          $micro = [System.IO.File]::ReadAllBytes('micro.sfx')
          $phar  = [System.IO.File]::ReadAllBytes('tphp.phar')
          [System.IO.File]::WriteAllBytes('tphp.exe', $micro + $phar)

      - name: Test
        shell: pwsh
        run: |
          ./tphp.exe test/main/min.php
          ./min.exe

      - name: Package
        shell: pwsh
        run: |
          mkdir release/tphp
          Copy-Item tphp.exe release/tphp/

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-win-x86_64
          path: release

  # ============================================================
  # Linux x86_64 — GCC 编译 TCC (mob 分支)
  # ============================================================
  linux-x86_64:
    runs-on: ubuntu-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-x86_64-glibc.zip
      MICRO_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-micro-8.4-linux-x86_64-glibc.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC & deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev git

      - name: Build TCC
        run: |
          bash build.sh
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php
          ./php -v

      - name: Download MICRO
        run: |
          curl -fsSL -o micro.zip "$MICRO_URL"
          unzip -q micro.zip
          chmod +x micro.sfx
          ls -la micro.sfx

      - name: BUILD PHAR
        run: |
          ./php -d "phar.readonly=0" build.php
          cat micro.sfx tphp.phar > tphp
          chmod +x tphp
          ls -la tphp

      - name: Debug TCC
        run: |
          echo "=== TCC binary ==="
          ls -la tcc/tcc
          echo "=== libtcc1.a ==="
          find tcc -name libtcc1.a -ls
          echo "=== CRT files ==="
          ls tcc/lib/tcc/crt*.o 2>/dev/null || echo "(no CRT files found)"
          echo "=== TCC dirs ==="
          find tcc -maxdepth 3 -type d

      - name: Test
        run: |
          ./tphp test/main/min.php
          ./min

      - name: Package
        run: |
          mkdir -p release/tphp
          cp tphp release/tphp/
          chmod +x release/tphp/tphp

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-linux-x86_64
          path: release

  # ============================================================
  # Linux aarch64 — GCC 编译 TCC (mob 分支)
  # ============================================================
  linux-aarch64:
    runs-on: ubuntu-24.04-arm
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-aarch64-glibc.zip
      MICRO_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-micro-8.4-linux-aarch64-glibc.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC & deps
        run: |
          sudo apt update
          sudo apt install -y gcc make libc6-dev git

      - name: Build TCC
        run: |
          bash build.sh
          ./tcc/tcc -v

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php
          ./php -v

      - name: Download MICRO
        run: |
          curl -fsSL -o micro.zip "$MICRO_URL"
          unzip -q micro.zip
          chmod +x micro.sfx
          ls -la micro.sfx

      - name: BUILD PHAR
        run: |
          ./php -d "phar.readonly=0" build.php
          cat micro.sfx tphp.phar > tphp
          chmod +x tphp
          ls -la tphp

      - name: Debug TCC
        run: |
          echo "=== libtcc1.a ==="
          find tcc -name libtcc1.a -ls

      - name: Test
        run: |
          ./tphp test/main/min.php
          ./min

      - name: Package
        run: |
          mkdir -p release/tphp
          cp tphp release/tphp/
          chmod +x release/tphp/tphp

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-linux-aarch64
          path: release

  # ============================================================
  # macOS aarch64 — clang 编译 TCC (mob 分支)
  # ============================================================
  macos-aarch64:
    runs-on: macos-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-macos-aarch64.zip
      MICRO_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-micro-8.4-macos-aarch64.zip
    steps:
      - uses: actions/checkout@v4

      - name: Build TCC
        run: |
          set -e
          export LANG=C
          SDK=$(xcrun --show-sdk-path)
          # 重试克隆（repo.or.cz 可能不稳定）
          for i in 1 2 3; do
            echo "[*] Clone attempt $i..."
            git clone --depth 1 --branch mob https://repo.or.cz/tinycc.git tinycc-src 2>/dev/null && break
            if [ "$i" -lt 3 ]; then sleep 10; fi
          done
          test -d tinycc-src || { echo "TCC clone failed"; exit 1; }
          cd tinycc-src
          # Symlink headers for TCC bootstrapping (Vlang-style)
          for i in include/*.h; do test -f $i && ln -sf $i $(basename $i); done
          # Key: --config-new_macho=yes for proper macOS Mach-O output
          ./configure \
            --prefix=../tcc \
            --bindir=../tcc \
            --crtprefix="../tcc:/usr/lib" \
            --libpaths="../tcc:/usr/local/lib:/usr/lib:/lib" \
            --sysincludepaths="../tcc/include:/usr/local/include:$SDK/usr/include" \
            --extra-cflags="-I$SDK/usr/include -O3" \
            --cc=cc \
            --config-new_macho=yes \
            --config-codesign=yes \
            --config-bcheck=yes \
            --config-backtrace=yes \
            --enable-static
          make
          make install
          cd ..
          # Ensure libtcc1.a is at tcc/libtcc1.a (--tccdir may or may not work)
          find tcc -name libtcc1.a -exec cp {} tcc/libtcc1.a \; -quit
          test -f tcc/libtcc1.a || { echo "ERROR: libtcc1.a not found"; exit 1; }
          # Link libc.dylib for Big Sur+ compatibility (build only, not packed into PHAR)
          ln -sf /usr/lib/libSystem.B.dylib tcc/libc.dylib 2>/dev/null || true
          # Copy macOS SDK headers into tcc/include/ for standalone compilation
          # (TCC's sysincludepaths hardcodes the CI machine's SDK path;
          #  bundling the headers ensures they're available on user machines)
          mkdir -p tcc/include
          cp -rn "$SDK/usr/include/"* tcc/include/ 2>/dev/null || true
          echo "  SDK headers: $(find tcc/include -type f 2>/dev/null | wc -l) files"
          # Verify standalone build
          ls -la tcc/tcc tcc/libtcc1.a
          echo 'int main(){return 0;}' > _test_tcc.c
          ./tcc/tcc -o _test_tcc _test_tcc.c && echo "TCC standalone OK" \
            || { echo "TCC FAIL";./tcc/tcc -v -v 2>&1; exit 1; }
          rm -f _test_tcc.c _test_tcc
          # Remove symlink before PHAR packaging (PHAR can't pack symlinks)
          rm -f tcc/libc.dylib

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php
          ./php -v

      - name: Download MICRO
        run: |
          curl -fsSL -o micro.zip "$MICRO_URL"
          unzip -q micro.zip
          chmod +x micro.sfx
          ls -la micro.sfx

      - name: BUILD PHAR
        run: |
          ./php -d "phar.readonly=0" build.php
          cat micro.sfx tphp.phar > tphp
          chmod +x tphp
          ls -la tphp

      - name: Test
        run: |
          ./tphp test/main/min.php
          file ./min
          otool -L ./min || true
          ./min
          echo "EXIT:$?"

      - name: Package
        run: |
          mkdir -p release/tphp
          cp tphp release/tphp/
          chmod +x release/tphp/tphp

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-macos-aarch64
          path: release
