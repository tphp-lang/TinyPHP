name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ============================================================
  # Windows x86_64 — MSYS2 MinGW64 编译 TCC (mob 分支)
  # ============================================================
  windows-x86_64:
    runs-on: windows-latest
    env:
      # ── 核心工具 ──
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-cli-win.zip
      MICRO_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-8.5.7-micro-win.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-win-x86_64.zip
      # ── 第三方库 ──
      LIB_EVENT_URL: https://github.com/libevent/libevent/archive/refs/tags/release-2.1.13-stable.zip
      # LIB_SSL_URL: https://...
      # LIB_CURL_URL: https://...
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gcc

      - name: Add TCC
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:TCC_URL -OutFile tcc.zip
          Expand-Archive -Path tcc.zip -DestinationPath .
          .\tcc\win32\tcc.exe -v

      - name: Build EXTS
        shell: msys2 {0}
        run: {
          # ── libevent ──
          echo "=== Building libevent ==="
          curl -fsSL -o libevent.zip "$LIB_EVENT_URL"
          unzip -q libevent.zip
          DIR=$(ls -d libevent-* | head -1)
          mkdir -p "$DIR/build"
          cmake -G "MinGW Makefiles" -DCMAKE_C_COMPILER=gcc -DCMAKE_BUILD_TYPE=Release \
            -S "$DIR" -B "$DIR/build"
          cmake --build "$DIR/build" -j$(nproc)
          mkdir -p ext/libevent/include ext/libevent/lib
          cp -r "$DIR/include/"* ext/libevent/include/
          cp "$DIR/build/lib/libevent.a" ext/libevent/lib/libevent_core.a
          cp "$DIR/build/include/event2/event-config.h" ext/libevent/include/event2/ 2>/dev/null || true
          rm -rf "$DIR"
          echo "libevent: $(ls ext/libevent/lib/)"

          # ── 其他库（按需添加）──
          # echo "=== Building xxx ==="
          # curl -fsSL -o xxx.zip "$LIB_XXX_URL"
          # ...
        }

      - name: Download PHP
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:PHP_URL -OutFile php.zip
          Expand-Archive -Path php.zip -DestinationPath .
          ls php.exe

      - name: Download MICRO
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri $env:MICRO_URL -OutFile micro.zip
          Expand-Archive -Path micro.zip -DestinationPath .
          ls micro.sfx

      - name: BUILD PHAR
        shell: pwsh
        run: |
          php.exe -d "phar.readonly=0" build.php
          $micro = [System.IO.File]::ReadAllBytes('micro.sfx')
          $phar  = [System.IO.File]::ReadAllBytes('tphp.phar')
          [System.IO.File]::WriteAllBytes('tphp.exe', $micro + $phar)

      - name: Test
        shell: pwsh
        run: |
          ./tphp.exe test/main/min.php
          ./min.exe

      - name: Package
        shell: pwsh
        run: |
          mkdir release/tphp
          Copy-Item tphp.exe release/tphp/

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-win-x86_64
          path: release

  # ============================================================
  # Linux x86_64 — GCC 编译 TCC (mob 分支)
  # ============================================================
  linux-x86_64:
    runs-on: ubuntu-latest
    env:
      PHP_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-cli-8.4-linux-x86_64-glibc.zip
      MICRO_URL: https://github.com/KingBes/TinyPHP/releases/download/PHP/php-micro-8.4-linux-x86_64-glibc.zip
      TCC_URL: https://github.com/tphp-lang/tccbin/releases/download/v0.0.1/tcc-linux-x86_64.zip
      LIB_EVENT_URL: https://github.com/libevent/libevent/archive/refs/tags/release-2.1.13-stable.zip
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y cmake gcc make

      - name: Add TCC
        run: |
          curl -fsSL -o tcc.zip "$TCC_URL"
          unzip -q tcc.zip
          chmod +x tcc/tcc
          ./tcc/tcc -v

      - name: Build EXTS
        run: |
          # ── libevent ──
          echo "=== Building libevent ==="
          curl -fsSL -o libevent.zip "$LIB_EVENT_URL"
          unzip -q libevent.zip
          DIR=$(ls -d libevent-* | head -1)
          mkdir -p "$DIR/build"
          cmake -DCMAKE_C_COMPILER=gcc -DCMAKE_BUILD_TYPE=Release \
            -S "$DIR" -B "$DIR/build"
          cmake --build "$DIR/build" -j$(nproc)
          mkdir -p ext/libevent/include ext/libevent/lib
          cp -r "$DIR/include/"* ext/libevent/include/
          cp "$DIR/build/lib/libevent.a" ext/libevent/lib/libevent_core.a
          cp "$DIR/build/include/event2/event-config.h" ext/libevent/include/event2/ 2>/dev/null || true
          rm -rf "$DIR"
          echo "libevent: $(ls ext/libevent/lib/)"

      - name: Download PHP
        run: |
          curl -fsSL -o php.zip "$PHP_URL"
          unzip -q php.zip
          chmod +x php

      - name: Download MICRO
        run: |
          curl -fsSL -o micro.zip "$MICRO_URL"
          unzip -q micro.zip
          chmod +x micro.sfx

      - name: BUILD PHAR
        run: |
          ./php -d "phar.readonly=0" build.php
          cat micro.sfx tphp.phar > tphp
          chmod +x tphp

      - name: Test
        run: |
          ./tphp test/main/min.php
          ./min

      - name: Package
        run: |
          mkdir -p release/tphp
          cp tphp release/tphp/
          chmod +x release/tphp/tphp

      - uses: actions/upload-artifact@v4
        with:
          name: tinyphp-linux-x86_64
          path: release

